<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClearMind</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --w95: rgba(255,255,255,0.95);
      --w75: rgba(255,255,255,0.75);
      --w55: rgba(255,255,255,0.55);
      --w25: rgba(255,255,255,0.25);
      --cream: rgba(240,228,213,0.92);
      --glass:        rgba(255,255,255,0.12);
      --glass-border: rgba(255,255,255,0.22);
      --radius: 20px;
    }

    html {
      min-height: 100%;
      background: linear-gradient(to bottom, #8B9BAF 0%, #B8967A 100%);
      background-attachment: fixed;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
      background: transparent;
      color: var(--w95);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #app {
      max-width: 430px; margin: 0 auto;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    #scroll-area {
      flex: 1; overflow-y: auto; padding-bottom: 90px;
      -webkit-overflow-scrolling: touch;
    }
    #scroll-area::-webkit-scrollbar { display: none; }

    .stack {
      padding: 0 18px 32px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ── Glass card ─── */
    .card {
      background: var(--glass);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 20px;
    }

    /* ── Header ─── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 32px 2px 10px;
    }
    .header-sub {
      font-size: 12px; font-weight: 400; letter-spacing: 1.8px;
      text-transform: uppercase; color: var(--w55); margin-bottom: 4px;
    }
    .header-name { font-size: 28px; font-weight: 200; letter-spacing: -0.5px; color: var(--w95); }
    .header-room { font-size: 11px; font-weight: 400; letter-spacing: 1.6px; color: var(--w55); margin-top: 3px; text-transform: uppercase; }
    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; color: #fff;
      letter-spacing: 0.5px; cursor: pointer;
    }

    /* ── Check-in ─── */
    .checkin-eyebrow {
      font-size: 11px; font-weight: 500; letter-spacing: 1.8px;
      text-transform: uppercase; color: var(--w55); margin-bottom: 10px;
    }
    .checkin-question {
      font-size: 20px; font-weight: 200; line-height: 1.45;
      letter-spacing: -0.2px; color: var(--w95); margin-bottom: 22px;
    }

    .emotion-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .emotion-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 15px; border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.08);
      color: var(--w75); font-size: 13px; font-weight: 400;
      cursor: pointer; font-family: inherit;
      transition: border-color .2s, background .2s, color .2s;
    }
    .emotion-chip svg { flex-shrink: 0; }
    .emotion-chip:hover {
      border-color: rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.18);
      color: var(--w95);
    }
    .emotion-chip.selected {
      border-color: rgba(255,255,255,0.60);
      background: rgba(255,255,255,0.25);
      color: #fff;
    }

    .checkin-submit {
      display: none; margin-top: 20px; width: 100%; padding: 13px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.18);
      color: #fff; font-size: 14px; font-weight: 400; letter-spacing: 0.4px;
      cursor: pointer; font-family: inherit;
      transition: background .2s, border-color .2s;
    }
    .checkin-submit:hover { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.65); }

    .checkin-success { display: none; text-align: center; padding: 36px 20px; }
    .checkin-success-icon  { font-size: 38px; margin-bottom: 14px; }
    .checkin-success-title { font-size: 18px; font-weight: 200; color: var(--w95); margin-bottom: 8px; }
    .checkin-success-sub   { font-size: 13px; color: var(--w75); line-height: 1.6; }
    .checkin-footer { font-size: 12px; color: rgba(255,255,255,0.50); text-align: center; padding: 10px 8px 0; line-height: 1.6; letter-spacing: 0.2px; }

    /* ── Stats ─── */
    .stats-row { display: flex; gap: 10px; }
    .stat-card {
      flex: 1;
      background: var(--glass); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border); border-radius: 16px;
      padding: 16px 10px; text-align: center;
    }
    .stat-value { font-size: 22px; font-weight: 200; letter-spacing: -0.5px; color: var(--w95); }
    .stat-unit  { font-size: 11px; color: var(--w55); font-weight: 400; }
    .stat-label { font-size: 10px; color: var(--w55); margin-top: 5px; letter-spacing: 0.4px; }

    /* ── Streak ─── */
    .streak-inner { display: flex; align-items: center; justify-content: space-between; }
    .streak-label { font-size: 11px; color: var(--w55); letter-spacing: 1.6px; text-transform: uppercase; margin-bottom: 5px; }
    .streak-count { font-size: 21px; font-weight: 200; color: var(--w95); }
    .streak-days  { display: flex; gap: 7px; }
    .streak-day {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 500;
    }
    .streak-day.done    { background: rgba(255,255,255,0.28); border: 1px solid rgba(255,255,255,0.50); color: #fff; }
    .streak-day.pending { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); color: var(--w55); }

    /* ── Chart ─── */
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .chart-title    { font-size: 15px; font-weight: 300; color: var(--w95); }
    .chart-subtitle { font-size: 11px; color: var(--w55); margin-top: 3px; letter-spacing: 0.3px; }
    .chart-toggles  { display: flex; gap: 6px; }
    .chart-toggle {
      padding: 5px 14px; border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.20); background: transparent;
      color: var(--w55); font-size: 12px; font-weight: 400; letter-spacing: 0.3px;
      cursor: pointer; font-family: inherit; transition: all .2s;
    }
    .chart-toggle.active {
      border-color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.18);
      color: #fff;
    }
    .chart-wrap  { position: relative; }
    .chart-label { font-size: 11px; fill: rgba(255,255,255,0.50); }
    .chart-dot   { cursor: pointer; }
    .chart-tooltip {
      position: absolute;
      background: rgba(0,0,0,0.22); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.18); border-radius: 10px;
      padding: 5px 11px; font-size: 12px; font-weight: 400; letter-spacing: 0.3px;
      color: #fff; pointer-events: none; opacity: 0; transition: opacity .15s;
      white-space: nowrap; transform: translateX(-50%);
    }

    /* ── Insights ─── */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 2px; }
    .section-title  { font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--w55); }
    .dot-indicators { display: flex; gap: 6px; align-items: center; }
    .dot { height: 4px; width: 4px; border-radius: 100px; background: rgba(255,255,255,0.25); cursor: pointer; transition: all .25s; }
    .dot.active { background: rgba(255,255,255,0.88); width: 14px; }

    .insight-body    { display: flex; align-items: flex-start; gap: 14px; }
    .insight-icon    { flex-shrink: 0; margin-top: 2px; color: var(--w75); opacity: 0.85; }
    .insight-content { flex: 1; }
    .insight-tag     { display: inline-block; padding: 2px 10px; border-radius: 100px; font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 9px; }
    .insight-headline { font-size: 15px; font-weight: 300; color: var(--w95); margin-bottom: 7px; line-height: 1.45; }
    .insight-text     { font-size: 13px; color: var(--w75); line-height: 1.65; }

    .insight-nav { display: flex; gap: 8px; margin-top: 18px; }
    .insight-btn { flex: 1; padding: 10px; border-radius: 12px; font-size: 13px; font-weight: 400; letter-spacing: 0.2px; cursor: pointer; font-family: inherit; transition: all .18s; }
    .insight-btn-prev { border: 1px solid var(--glass-border); background: transparent; color: var(--w55); }
    .insight-btn-prev:hover { color: var(--w75); border-color: rgba(255,255,255,0.35); }
    .insight-btn-next { border: 1px solid rgba(255,255,255,0.35); background: rgba(255,255,255,0.14); color: #fff; }
    .insight-btn-next:hover { background: rgba(255,255,255,0.22); }

    /* ── Resources ─── */
    .resources-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .resource-btn {
      display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
      padding: 18px 16px; border-radius: 18px;
      background: var(--glass); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border); cursor: pointer; font-family: inherit;
      transition: background .2s, border-color .2s, transform .18s;
    }
    .resource-btn:hover { background: rgba(255,255,255,0.20); border-color: rgba(255,255,255,0.35); transform: translateY(-2px); }
    .resource-icon  { color: var(--w75); opacity: 0.85; }
    .resource-label { font-size: 13px; font-weight: 300; color: var(--w75); letter-spacing: 0.2px; }

    /* ── Bottom nav ─── */
    #bottom-nav {
      position: sticky; bottom: 0;
      background: rgba(255,255,255,0.10); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.18);
      display: flex; justify-content: space-around;
      padding: 13px 0 22px;
    }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      background: none; border: none; cursor: pointer;
      padding: 4px 20px; font-family: inherit;
    }
    .nav-icon {
      display: flex; align-items: center; justify-content: center;
      color: #fff; opacity: 0.30; transition: opacity .2s;
    }
    .nav-label { font-size: 9px; font-weight: 400; letter-spacing: 0.6px; color: var(--w55); transition: color .2s; }
    .nav-btn.active .nav-icon  { opacity: 0.90; }
    .nav-btn.active .nav-label { color: #fff; }

    /* ── Garden ─── */
    .garden-caption  { font-size: 12px; color: rgba(255,255,255,0.70); text-align: center; margin-top: 14px; letter-spacing: 0.3px; }
    .milestones      { display: flex; align-items: flex-start; justify-content: center; gap: 6px; margin-top: 16px; }
    .milestone       { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .milestone-icon  { font-size: 22px; line-height: 1; }
    .milestone-line  { width: 36px; height: 1px; margin-top: 11px; flex-shrink: 0; }
    .milestone-label { font-size: 10px; letter-spacing: 0.5px; }
    .garden-note     { font-size: 12px; color: rgba(255,255,255,0.50); text-align: center; margin-top: 16px; line-height: 1.6; letter-spacing: 0.2px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 14px; }

    /* ── Window hero ─── */
    .window-wrap { position: relative; }
    .window-glow {
      position: absolute; inset: -18px -10px;
      background: radial-gradient(ellipse at 50% 65%, rgba(200,145,75,0.20) 0%, transparent 68%);
      pointer-events: none; z-index: 0; border-radius: 30px;
    }
    .window-frame {
      position: relative; z-index: 1;
      width: 100%; height: 180px;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.15);
      overflow: hidden;
      background: linear-gradient(to bottom, #1a1a2e 0%, #2d3561 100%);
      transition: background 1.2s ease;
    }
    .window-frame.calm      { background: linear-gradient(to bottom, #1a3a4a 0%, #2a5a6a 100%); }
    .window-frame.focused   { background: linear-gradient(to bottom, #2a2a3a 0%, #4a6a7a 100%); }
    .window-frame.anxious   { background: linear-gradient(to bottom, #1a1a2a 0%, #2a2a3a 100%); }
    .window-frame.tired     { background: linear-gradient(to bottom, #3a2a1a 0%, #5a3a2a 100%); }
    .window-frame.motivated { background: linear-gradient(to bottom, #3a2a1a 0%, #8a5a2a 100%); }
    .window-frame.stressed  { background: linear-gradient(to bottom, #1a2a1a 0%, #2a3a2a 100%); }
    #window-scene { position: absolute; inset: 0; width: 100%; height: 100%; }
    .rain-container { position: absolute; inset: 0; pointer-events: none; overflow: hidden; display: none; }
    .rain-drop {
      position: absolute; top: -30px; width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(180,200,255,0.52));
      border-radius: 100px;
      animation: rain-fall linear infinite;
    }
    @keyframes rain-fall {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      8%   { opacity: 0.9; }
      92%  { opacity: 0.5; }
      100% { transform: translateY(220px) translateX(-18px); opacity: 0; }
    }
    .window-overlay {
      position: absolute; top: 16px; left: 18px; z-index: 3; pointer-events: none;
    }
    .window-date  { font-size: 9px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.50); line-height: 1; }
    .window-night { font-size: 14px; font-weight: 200; letter-spacing: 0.5px; color: rgba(255,255,255,0.66); margin-top: 5px; }
    .window-sill {
      position: absolute; bottom: 0; left: 0; right: 0; height: 40px; z-index: 4;
      background: rgba(16,10,4,0.42);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      border-top: 1px solid rgba(255,255,255,0.09);
      display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
    }
  </style>
</head>
<body>

<div id="app">
  <div id="scroll-area">
    <div class="stack">

      <!-- Header -->
      <header class="header">
        <div>
          <p class="header-sub">歡迎回到您的房間</p>
          <h1 class="header-name">Caressa</h1>
          <p class="header-room">Room 525</p>
        </div>
        <div class="avatar">CA</div>
      </header>

      <!-- Window hero -->
      <div class="window-wrap">
        <div class="window-glow"></div>
        <div class="window-frame" id="window-frame">
          <svg id="window-scene" viewBox="0 0 340 180" preserveAspectRatio="xMidYMid slice"></svg>
          <div class="rain-container" id="rain-container"></div>
          <div class="window-overlay">
            <p class="window-date">JUL 4, 2026</p>
            <p class="window-night">第 5 晚</p>
          </div>
          <div class="window-sill">
            <!-- Teacup -->
            <svg width="30" height="26" viewBox="0 0 30 26" fill="none" stroke="rgba(255,255,255,0.48)" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 7C9 5 10 3 9 1" stroke-width="1.1" opacity="0.48"/>
              <path d="M14 6C14 4 15 2 14 0" stroke-width="1" opacity="0.36"/>
              <path d="M5 9H21L19 20H7Z" stroke-width="1.3"/>
              <path d="M21 12H24Q27 12 27 15Q27 18 24 18H21" stroke-width="1.2"/>
              <line x1="3" y1="22" x2="23" y2="22" stroke-width="1.2"/>
            </svg>
            <!-- Open book -->
            <svg width="32" height="22" viewBox="0 0 32 22" fill="none" stroke="rgba(255,255,255,0.48)" stroke-linecap="round" stroke-linejoin="round">
              <line x1="16" y1="3" x2="16" y2="19" stroke-width="1.2"/>
              <path d="M2 3C8 2 16 3 16 3L16 19C8 18 2 19 2 19Z" stroke-width="1.3"/>
              <path d="M30 3C24 2 16 3 16 3L16 19C24 18 30 19 30 19Z" stroke-width="1.3"/>
              <line x1="5"  y1="9"  x2="13" y2="9"  stroke-width="0.9" opacity="0.40"/>
              <line x1="5"  y1="13" x2="13" y2="13" stroke-width="0.9" opacity="0.40"/>
              <line x1="19" y1="9"  x2="27" y2="9"  stroke-width="0.9" opacity="0.40"/>
              <line x1="19" y1="13" x2="27" y2="13" stroke-width="0.9" opacity="0.40"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Check-in -->
      <div>
        <div class="card" id="checkin-card">
          <p class="checkin-eyebrow">今日入住</p>
          <p class="checkin-question">您今晚入住<br>哪種心情？</p>
          <div class="emotion-chips" id="emotion-chips"></div>
          <button class="checkin-submit" id="checkin-submit" onclick="submitCheckin()">
            確認入住
          </button>
        </div>
        <div class="card checkin-success" id="checkin-success">
          <div class="checkin-success-icon">🗝️</div>
          <p class="checkin-success-title">入住完成</p>
          <p class="checkin-success-sub">您的心情已登記入住。<br>明日退房，壞情緒由房務清理。</p>
        </div>
        <p class="checkin-footer">壞心情請放心留下，房務人員會為您整理。</p>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <p class="stat-value">78<span class="stat-unit">/100</span></p>
          <p class="stat-label">今日房況</p>
        </div>
        <div class="stat-card">
          <p class="stat-value">70<span class="stat-unit">/100</span></p>
          <p class="stat-label">本週平均</p>
        </div>
        <div class="stat-card">
          <p class="stat-value">22<span class="stat-unit"> 晚</span></p>
          <p class="stat-label">本月入住</p>
        </div>
      </div>

      <!-- Streak -->
      <div class="card">
        <div class="streak-inner">
          <div>
            <p class="streak-label">連續入住</p>
            <p class="streak-count">🔥 5 晚</p>
          </div>
          <div class="streak-days" id="streak-days"></div>
        </div>
      </div>

      <!-- Chart -->
      <div class="card">
        <div class="chart-header">
          <div>
            <p class="chart-title">入住紀錄</p>
            <p class="chart-subtitle">過去七晚</p>
          </div>
          <div class="chart-toggles">
            <button class="chart-toggle active" id="toggle-mood"   onclick="setChartMode('score')">心情</button>
            <button class="chart-toggle"        id="toggle-stress" onclick="setChartMode('stress')">壓力</button>
          </div>
        </div>
        <div class="chart-wrap" id="chart-wrap">
          <div class="chart-tooltip" id="chart-tooltip"></div>
        </div>
      </div>

      <!-- Insights -->
      <div>
        <div class="section-header">
          <p class="section-title">旅館小語</p>
          <div class="dot-indicators" id="insight-dots"></div>
        </div>
        <div class="card">
          <div class="insight-body">
            <div class="insight-icon"    id="insight-icon"></div>
            <div class="insight-content">
              <span class="insight-tag"      id="insight-tag"></span>
              <p    class="insight-headline" id="insight-headline"></p>
              <p    class="insight-text"     id="insight-text"></p>
            </div>
          </div>
          <div class="insight-nav">
            <button class="insight-btn insight-btn-prev" onclick="prevInsight()">← Prev</button>
            <button class="insight-btn insight-btn-next" onclick="nextInsight()">Next →</button>
          </div>
        </div>
      </div>

      <!-- Resources -->
      <div>
        <div class="section-header" style="margin-bottom:12px">
          <p class="section-title">客房服務</p>
        </div>
        <div class="resources-grid" id="resources-grid"></div>
      </div>

      <!-- Garden -->
      <div>
        <div style="margin-bottom:12px; padding:0 2px;">
          <p class="section-title">頂樓花園</p>
          <p style="font-size:10px; color:var(--w55); letter-spacing:0.8px; margin-top:3px;">住客專屬空間</p>
        </div>
        <div class="card">

          <!-- Garden SVG scene -->
          <svg viewBox="0 0 340 155" width="100%" style="display:block; overflow:visible;">
            <defs>
              <radialGradient id="gGlow" cx="50%" cy="80%" r="55%">
                <stop offset="0%"   stop-color="#FFFAEE" stop-opacity="0.18"/>
                <stop offset="100%" stop-color="#FFFAEE" stop-opacity="0"/>
              </radialGradient>
            </defs>

            <!-- Soft ambient glow -->
            <ellipse cx="170" cy="116" rx="158" ry="60" fill="url(#gGlow)"/>

            <!-- Soil ground -->
            <path d="M0 130 Q170 126 340 130 L340 155 L0 155 Z" fill="rgba(95,68,42,0.28)"/>
            <path d="M0 130 Q170 126 340 130" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

            <!-- ── SLOT 1  x=34  Fully grown flower (unlocked) ── -->
            <line x1="34" y1="130" x2="34" y2="74"
                  stroke="rgba(185,210,162,0.88)" stroke-width="1.6" stroke-linecap="round"/>
            <!-- left leaf -->
            <path d="M34 108 Q22 101 21 91 Q29 98 34 108Z"
                  fill="rgba(172,198,150,0.38)" stroke="rgba(192,216,168,0.78)" stroke-width="1" stroke-linejoin="round"/>
            <!-- right leaf -->
            <path d="M34 117 Q47 108 49 97 Q41 106 34 117Z"
                  fill="rgba(172,198,150,0.38)" stroke="rgba(192,216,168,0.78)" stroke-width="1" stroke-linejoin="round"/>

  // ── Chart ─────────────────────────────────────────────────────────────────
  function setChartMode(mode) {
    chartMode = mode;
    document.getElementById('toggle-mood').classList.toggle('active',   mode === 'score');
    document.getElementById('toggle-stress').classList.toggle('active', mode === 'stress');
    renderChart();
  }

  function renderChart() {
    const W = 376, H = 120, padY = 10;
    const n = WEEKLY_DATA.length;
    const xStep = W / (n - 1);
    // Both modes use white — mood is brighter, stress is warm cream
    const color = chartMode === 'score' ? 'rgba(255,255,255,0.90)' : 'rgba(240,224,205,0.85)';
    const gid   = 'cg_' + chartMode;

    const pts = WEEKLY_DATA.map((d, i) => ({
      x: i * xStep,
      y: padY + (1 - d[chartMode] / 100) * (H - padY * 2),
      v: d[chartMode], day: d.day,
    }));

    let line = `M ${r(pts[0].x)} ${r(pts[0].y)}`;
    const t  = xStep * 0.42;
    for (let i = 1; i < n; i++) {
      line += ` C ${r(pts[i-1].x+t)} ${r(pts[i-1].y)},${r(pts[i].x-t)} ${r(pts[i].y)},${r(pts[i].x)} ${r(pts[i].y)}`;
    }
    const area = `${line} L ${r(pts[n-1].x)} ${H} L 0 ${H} Z`;

    const dotColor = chartMode === 'score' ? 'rgba(255,255,255,0.92)' : 'rgba(240,224,205,0.88)';
    const dots = pts.map(p =>
      `<circle cx="${r(p.x)}" cy="${r(p.y)}" r="3.5" fill="${dotColor}" class="chart-dot"
         onmouseenter="showTip(event,'${p.day}',${p.v})" onmouseleave="hideTip()"/>`
    ).join('');

    const labels = pts.map(p =>
      `<text x="${r(p.x)}" y="${H+20}" text-anchor="middle" class="chart-label">${p.day}</text>`
    ).join('');

    const svg = `
      <svg viewBox="0 0 ${W} ${H+28}" width="100%" style="overflow:visible;display:block">
        <defs>
          <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="rgba(255,255,255,1)" stop-opacity=".18"/>
            <stop offset="100%" stop-color="rgba(255,255,255,1)" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="${area}" fill="url(#${gid})" stroke="none"/>
        <path d="${line}" fill="none" stroke="${color}" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
        ${dots}${labels}
      </svg>`;

    const wrap    = document.getElementById('chart-wrap');
    const tooltip = document.getElementById('chart-tooltip');
    wrap.innerHTML = svg;
    wrap.appendChild(tooltip);
  }

  function r(n) { return n.toFixed(2); }

  function showTip(e, day, val) {
    const tip  = document.getElementById('chart-tooltip');
    const wrap = document.getElementById('chart-wrap').getBoundingClientRect();
    const dot  = e.target.getBoundingClientRect();
    tip.textContent   = `${day}  ·  ${val}`;
    tip.style.left    = (dot.left - wrap.left + dot.width / 2) + 'px';
    tip.style.top     = (dot.top  - wrap.top  - 36) + 'px';
    tip.style.opacity = '1';
  }
  function hideTip() { document.getElementById('chart-tooltip').style.opacity = '0'; }

  function generateRain() {
    const container = document.getElementById('rain-container');
    container.innerHTML = '';
    for (let i = 0; i < 26; i++) {
      const drop = document.createElement('div');
      drop.className = 'rain-drop';
      const left     = Math.random() * 102;
      const height   = 12 + Math.random() * 22;
      const duration = 0.60 + Math.random() * 0.75;
      const delay    = -(Math.random() * 2.0);
      drop.style.cssText = `left:${left}%;height:${height}px;animation-duration:${duration}s;animation-delay:${delay}s;`;
      container.appendChild(drop);
    }
  }

  function updateWindow(id) {
    const frame = document.getElementById('window-frame');
    const scene = document.getElementById('window-scene');
    const rain  = document.getElementById('rain-container');
    frame.className = 'window-frame' + (id ? ' ' + id : '');
    scene.innerHTML = WINDOW_SCENES[id] || WINDOW_SCENES.default;
    if (id === 'anxious') {
      generateRain();
      rain.style.display = 'block';
    } else {
      rain.style.display = 'none';
      rain.innerHTML = '';
    }
  }

  // ── Bottom nav ────────────────────────────────────────────────────────────
  function setNav(btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  renderNavIcons();
  renderEmotionChips();
  renderStreakDays();
  renderChart();
  renderInsight();
  renderResources();
  updateWindow(null);
</script>
